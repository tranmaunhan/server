spring:
  application:
    name: expense-api
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://postgres:5432/sampledb}
    username: ${SPRING_DATASOURCE_USERNAME:sample}
    password: ${SPRING_DATASOURCE_PASSWORD:samplepass}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  jackson:
    serialization:
      indent-output: true

server:
  port: ${SERVER_PORT:8080}

app:
  cors:
    allowed-origins: ${APP_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173,http://localhost:18080,http://127.0.0.1:18080}
  google:
    allowed-client-ids: ${GOOGLE_ALLOWED_CLIENT_IDS:}
    jwk-set-uri: ${GOOGLE_JWK_SET_URI:https://www.googleapis.com/oauth2/v3/certs}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
