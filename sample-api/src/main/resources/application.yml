spring:
  application:
    name: sample-api
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://postgres:5432/sampledb}
    username: ${SPRING_DATASOURCE_USERNAME:sample}
    password: ${SPRING_DATASOURCE_PASSWORD:samplepass}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  jackson:
    serialization:
      indent-output: true

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
