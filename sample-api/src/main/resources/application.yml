spring:
  application:
    name: family-expense-api
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://postgres:5432/sampledb}
    username: ${SPRING_DATASOURCE_USERNAME:sample}
    password: ${SPRING_DATASOURCE_PASSWORD:samplepass}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: Asia/Ho_Chi_Minh
  jackson:
    serialization:
      indent-output: true
  flyway:
    enabled: true
  servlet:
    multipart:
      max-file-size: ${SPRING_SERVLET_MULTIPART_MAX_FILE_SIZE:10MB}
      max-request-size: ${SPRING_SERVLET_MULTIPART_MAX_REQUEST_SIZE:10MB}

server:
  port: ${SERVER_PORT:8080}

app:
  cors:
    allowed-origins: ${APP_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173,http://localhost:18080,http://127.0.0.1:18080}
  upload:
    dir: ${APP_UPLOAD_DIR:uploads}
    public-base-path: ${APP_UPLOAD_PUBLIC_BASE_PATH:/api/uploads}
  google:
    allowed-client-ids: ${GOOGLE_ALLOWED_CLIENT_IDS:}
    jwk-set-uri: ${GOOGLE_JWK_SET_URI:https://www.googleapis.com/oauth2/v3/certs}
  jwt:
    secret: ${APP_JWT_SECRET:change-me-to-a-long-random-secret-key}
    expiration-minutes: ${APP_JWT_EXPIRATION_MINUTES:10080}
    issuer: ${APP_JWT_ISSUER:family-expense-api}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
